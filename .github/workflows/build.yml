name: Build

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Configure
              run: cmake -B build -DCMAKE_C_STANDARD=99

            - name: Build
              run: cmake --build build

            - name: Run smoke test
              run: ./build/apps/minirtos_app

            - name: Run unit tests
              run: ctest --test-dir build --output-on-failure
